<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YeparDTEcore — Panel de Control</title>
<!-- Fuentes: Outfit para lectura y JetBrains Mono para datos técnicos -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #07090f;
    --bg-card: #131922;
    --bg-input: #0e1219;
    --accent: #10b981;
    --accent-dim: rgba(16, 185, 129, 0.1);
    --border: rgba(255, 255, 255, 0.07);
    --text-main: #e2e8f0;
    --text-dim: #64748b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background-color: var(--bg-deep);
    color: var(--text-main);
    font-family: 'Outfit', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Efecto de rejilla sutil al fondo */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image: linear-gradient(rgba(16,185,129,.02) 1px, transparent 1px), 
                      linear-gradient(90deg, rgba(16,185,129,.02) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Header / Navbar */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(7, 9, 15, 0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 60px;
    display: flex; align-items: center; gap: 16px;
  }

  .urlbar {
    flex: 1; display: flex; align-items: center; gap: 8px;
    background: var(--bg-input);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px; padding: 0 12px; height: 38px;
  }

  .urlbar span { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .urlbar input { 
    background: none; border: none; outline: none; color: var(--text-main); 
    font-family: 'JetBrains Mono', monospace; font-size: 13px; width: 100%;
  }

  /* Layout Principal */
  .main {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto;
    padding: 32px 24px;
    display: grid; grid-template-columns: 1fr 360px; gap: 24px;
  }

  /* Tarjetas de Pasos */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px; margin-bottom: 16px;
    overflow: hidden; transition: border-color 0.3s;
  }

  .card.active { border-color: rgba(16, 185, 129, 0.4); }
  .card.locked { opacity: 0.5; pointer-events: none; }

  .card-header {
    padding: 20px; display: flex; align-items: center; gap: 15px;
    cursor: pointer; border-bottom: 1px solid var(--border);
  }

  .step-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg-input); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }

  .card.active .step-num { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

  .card-body { padding: 24px; display: none; }
  .card.active .card-body { display: block; }

  /* Inputs y Formularios */
  .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .field label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  
  input, select {
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; color: var(--text-main);
    font-family: 'Outfit', sans-serif; transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); outline: none; }

  /* Botones */
  .btn {
    padding: 10px 20px; border-radius: 8px; border: none;
    font-weight: 500; cursor: pointer; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 8px;
  }

  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { transform: translateY(-1px); opacity: 0.9; }

  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  /* Consola Lateral */
  .console {
    position: sticky; top: 84px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; height: calc(100vh - 120px); display: flex; flex-direction: column;
  }

  .console-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim);
  }

  .console-body {
    flex: 1; padding: 12px; overflow-y: auto;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
  }

  .log-entry { margin-bottom: 6px; border-left: 2px solid transparent; padding-left: 8px; }
  .log-time { color: var(--text-dim); margin-right: 8px; }
  .log-info { border-color: #3b82f6; color: #93c5fd; }
  .log-success { border-color: var(--accent); color: #6ee7b7; }
  .log-error { border-color: #ef4444; color: #fca5a5; }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .console { position: static; height: 300px; }
  }
</style>
</head>
<body>

<nav>
  <div style="font-weight: 600; color: var(--accent); font-size: 18px;">YeparDTEcore</div>
  <div class="urlbar">
    <span>ENDPOINT</span>
    <input type="text" id="apiUrl" value="https://yepardtecore.cl">
  </div>
  <button class="btn btn-outline" onclick="checkConnection()">Test API</button>
</nav>

<div class="main">
  <div class="steps-container">
    
    <!-- Paso 1: Emisor -->
    <div class="card active" id="step1">
      <div class="card-header" onclick="toggleStep(1)">
        <div class="step-num">1</div>
        <div style="flex: 1">Configuración del Emisor</div>
        <span id="badge1" style="font-size: 10px; color: var(--text-dim);">PENDIENTE</span>
      </div>
      <div class="card-body">
        <div class="field-group">
          <div class="field">
            <label>RUT Empresa</label>
            <input type="text" id="rut" placeholder="78377021-0">
          </div>
          <div class="field">
            <label>Razón Social</label>
            <input type="text" id="rsocial" placeholder="Servicios Tecnológicos SpA">
          </div>
        </div>
        <div class="field">
          <label>Giro Comercial</label>
          <input type="text" id="giro" placeholder="Consultoría en informática">
        </div>
        <button class="btn btn-primary" onclick="saveEmisor()">Guardar y Continuar</button>
      </div>
    </div>

    <!-- Paso 2: Certificado -->
    <div class="card locked" id="step2">
      <div class="card-header" onclick="toggleStep(2)">
        <div class="step-num">2</div>
        <div style="flex: 1">Firma Electrónica (.p12)</div>
      </div>
      <div class="card-body">
        <p style="font-size: 13px; color: var(--text-dim); margin-bottom: 15px;">Sube tu archivo de certificado digital para firmar los documentos.</p>
        <div class="field">
          <input type="file" id="p12file" accept=".p12,.pfx">
        </div>
        <div class="field">
          <label>Contraseña del Certificado</label>
          <input type="password" id="p12pass" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" onclick="uploadCert()">Subir Certificado</button>
      </div>
    </div>

    <!-- Paso 3: Certificación -->
    <div class="card locked" id="step3">
      <div class="card-header" onclick="toggleStep(3)">
        <div class="step-num">3</div>
        <div style="flex: 1">Certificación ante el SII</div>
      </div>
      <div class="card-body">
        <div style="display: grid; gap: 12px;">
          <button class="btn btn-outline" onclick="generateSet(39)">
            📄 Generar Set Boletas (Tipo 39/41)
          </button>
          <button class="btn btn-outline" onclick="generateSet(33)">
            💼 Generar Set Básico Facturas (N° 4784337)
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- Consola -->
  <aside class="console">
    <div class="console-header">
      <span>CONSOLA API</span>
      <span style="cursor:pointer" onclick="clearConsole()">Limpiar</span>
    </div>
    <div class="console-body" id="consoleBody">
      <div class="log-entry log-info">
        <span class="log-time">16:45:01</span> Sistema listo para operar.
      </div>
    </div>
  </aside>
</div>

<script>
  function log(msg, type = 'info') {
    const body = document.getElementById('consoleBody');
    const time = new Date().toLocaleTimeString('es-CL', { hour12: false });
    const div = document.createElement('div');
    div.className = `log-entry log-${type}`;
    div.innerHTML = `<span class="log-time">${time}</span> ${msg}`;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }

  function toggleStep(n) {
    const card = document.getElementById(`step${n}`);
    if (card.classList.contains('locked')) return;
    card.classList.toggle('active');
  }

  function unlockStep(n) {
    const card = document.getElementById(`step${n}`);
    card.classList.remove('locked');
    card.classList.add('active');
    log(`Paso ${n} desbloqueado`, 'success');
  }

  async function checkConnection() {
    log('Probando conexión con endpoint...');
    // Simulación de fetch
    setTimeout(() => log('Conexión establecida con éxito.', 'success'), 500);
  }

  function saveEmisor() {
    const rut = document.getElementById('rut').value;
    if(!rut) return log('RUT es obligatorio', 'error');
    log(`Emisor ${rut} guardado en base de datos.`, 'success');
    document.getElementById('badge1').textContent = 'COMPLETADO';
    document.getElementById('badge1').style.color = '#10b981';
    unlockStep(2);
  }

  function clearConsole() {
    document.getElementById('consoleBody').innerHTML = '';
  }
</script>

</body>
</html>
