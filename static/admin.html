<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YeparDTEcore — Panel de Administración</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #07090f;
            --bg-card: #131922;
            --bg-input: #0e1219;
            --accent: #10b981;
            --accent-dim: rgba(16, 185, 129, 0.1);
            --border: rgba(255, 255, 255, 0.07);
            --text-main: #e2e8f0;
            --text-dim: #64748b;
            --error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column;
        }

        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: linear-gradient(rgba(16,185,129,.02) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(16,185,129,.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(7, 9, 15, 0.9); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .logo { font-weight: 600; color: var(--accent); font-size: 20px; letter-spacing: -0.5px; }
        
        .main-layout {
            position: relative; z-index: 1;
            max-width: 1300px; margin: 0 auto;
            display: grid; grid-template-columns: 1fr 380px; gap: 24px;
            padding: 32px 24px; width: 100%;
        }

        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; margin-bottom: 20px; overflow: hidden;
            transition: all 0.3s ease;
        }
        .card.active { border-color: rgba(16, 185, 129, 0.3); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .card.locked { opacity: 0.5; filter: grayscale(1); pointer-events: none; }

        .card-header {
            padding: 20px 24px; display: flex; align-items: center; gap: 16px;
            cursor: pointer; background: rgba(255,255,255,0.02);
        }
        .step-num {
            width: 30px; height: 30px; border-radius: 8px;
            background: var(--bg-input); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim);
        }
        .card.active .step-num { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

        .card-body { padding: 24px; display: none; }
        .card.active .card-body { display: block; }

        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        .field label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        
        input, select {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 16px; color: var(--text-main);
            font-family: 'Outfit', sans-serif; font-size: 14px;
            transition: all 0.2s;
        }
        input:focus { border-color: var(--accent); outline: none; background: #121820; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        .act-row { 
            display: grid; grid-template-columns: 120px 1fr 100px 40px; 
            gap: 12px; align-items: flex-end; margin-bottom: 12px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .btn-del {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error); border-radius: 8px; height: 42px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .btn-del:hover { background: var(--error); color: white; }

        .btn {
            padding: 12px 24px; border-radius: 10px; border: none;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 10px; font-size: 14px;
        }
        .btn-primary { background: var(--accent); color: #07090f; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--accent-dim); }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

        .console {
            position: sticky; top: 96px; height: calc(100vh - 128px);
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; display: flex; flex-direction: column;
        }
        .console-header {
            padding: 14px 20px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim);
        }
        .console-body {
            flex: 1; padding: 16px; overflow-y: auto;
            font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.5;
        }
        .log-entry { margin-bottom: 8px; padding-left: 12px; border-left: 2px solid #334155; }
        .log-success { border-color: var(--accent); color: #6ee7b7; }
        .log-warn { border-color: #f59e0b; color: #fcd34d; }
        .log-error { border-color: var(--error); color: #fca5a5; }
        .log-time { color: var(--text-dim); margin-right: 8px; font-size: 10px; }

        @media (max-width: 1000px) {
            .main-layout { grid-template-columns: 1fr; }
            .console { height: 350px; position: static; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">YeparDTEcore <span style="font-weight: 300; font-size: 12px; color: var(--text-dim); margin-left: 8px;">v1.0.4</span></div>
    <div class="btn-ghost" style="padding: 6px 12px; font-size: 11px; font-family: 'JetBrains Mono'; border-radius: 6px; letter-spacing: 0.5px;">
        STATUS: ONLINE
    </div>
</nav>

<div class="main-layout">
    <div class="steps">
        
        <!-- PASO 1: EMISOR -->
        <div class="card active" id="card1">
            <div class="card-header" onclick="toggleCard(1)">
                <div class="step-num">01</div>
                <div style="flex: 1">
                    <h3 style="font-size: 16px; font-weight: 500;">Configuración del Emisor</h3>
                    <p style="font-size: 12px; color: var(--text-dim);">Identificación tributaria del contribuyente[cite: 2]</p>
                </div>
                <div id="status1" style="font-size: 10px; color: var(--accent); font-weight: 600;">EN PROCESO</div>
            </div>
            <div class="card-body">
                <div class="grid-form">
                    <div class="field">
                        <label>RUT Contribuyente</label>
                        <input type="text" id="e_rut" class="mono" placeholder="12.345.678-9">
                    </div>
                    <div class="field">
                        <label>Razón Social</label>
                        <input type="text" id="e_rs" placeholder="EMPRESA DE PRUEBA SPA">
                    </div>
                    <div class="field full-width">
                        <label>Dirección Casa Matriz</label>
                        <input type="text" id="e_dir" placeholder="AV. SIEMPRE VIVA 742, SANTIAGO">
                    </div>
                    <div class="field">
                        <label>Dirección Regional / Unidad</label>
                        <input type="text" id="e_regional" placeholder="SANTIAGO CENTRO">
                    </div>
                    <div class="field">
                        <label>Glosa Descriptiva</label>
                        <input type="text" id="e_glosa" placeholder="Servicios de asesoría y tecnología">
                    </div>
                </div>

                <!-- Actividades Económicas -->
                <div style="margin-top:32px; padding-top:24px; border-top:1px solid var(--border)">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                        <label style="font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 600;">Actividades Económicas (Máximo 5)[cite: 2]</label>
                        <button class="btn-ghost" id="btn_add" onclick="addActivity()" style="padding: 4px 10px; font-size: 11px;">+ AGREGAR</button>
                    </div>
                    <div id="activities_container">
                        <!-- Filas dinámicas aquí -->
                    </div>
                </div>

                <div style="margin-top: 24px; display: flex; justify-content: flex-end;">
                    <button class="btn btn-primary" onclick="saveStep1()">Guardar Configuración</button>
                </div>
            </div>
        </div>

        <!-- PASO 2: CERTIFICADO -->
        <div class="card locked" id="card2">
            <div class="card-header" onclick="toggleCard(2)">
                <div class="step-num">02</div>
                <div style="flex: 1">
                    <h3 style="font-size: 16px; font-weight: 500;">Firma Digital & Certificación</h3>
                </div>
            </div>
            <div class="card-body">
                <div class="grid-form">
                    <div class="field full-width">
                        <label>Archivo Certificado (.p12 / .pfx)</label>
                        <input type="file" id="cert_file">
                    </div>
                    <div class="field">
                        <label>Contraseña Certificado</label>
                        <input type="password" id="cert_pass" placeholder="••••••••">
                    </div>
                </div>
                <div style="margin-top: 24px; display: flex; gap: 12px; justify-content: flex-end;">
                    <button class="btn btn-ghost" onclick="log('Generando set de prueba...', 'info')">Test Set (33)</button>
                    <button class="btn btn-primary">Subir y Validar</button>
                </div>
            </div>
        </div>

    </div>

    <!-- CONSOLA LATERAL -->
    <aside class="console">
        <div class="console-header">
            <span>TERMINAL LOG</span>
            <span style="cursor:pointer; opacity: 0.5;" onclick="clearLogs()">LIMPIAR</span>
        </div>
        <div class="console-body" id="console">
            <div class="log-entry">Esperando configuración del emisor...</div>
        </div>
    </aside>
</div>

<script>
    let activitiesCount = 0;

    function addActivity(codigo = '', descripcion = '', afecto = 'SI') {
        if (activitiesCount >= 5) {
            log('Atención: Se ha alcanzado el máximo de 5 actividades[cite: 2].', 'warn');
            return;
        }

        activitiesCount++;
        const container = document.getElementById('activities_container');
        const div = document.createElement('div');
        div.className = 'act-row';
        div.id = `act_${activitiesCount}`;

        div.innerHTML = `
            <div class="field">
                <label>Código</label>
                <input type="text" class="mono act-cod" value="${codigo}" placeholder="702000">
            </div>
            <div class="field">
                <label>Descripción</label>
                <input type="text" class="act-desc" value="${descripcion}" placeholder="ASESORIAS DE GESTION">
            </div>
            <div class="field">
                <label>Afecto IVA</label>
                <select class="act-iva">
                    <option value="SI" ${afecto === 'SI' ? 'selected' : ''}>SI</option>
                    <option value="NO" ${afecto === 'NO' ? 'selected' : ''}>NO</option>
                </select>
            </div>
            <button class="btn-del" onclick="removeActivity('${div.id}')">×</button>
        `;

        container.appendChild(div);
        checkButtonStatus();
    }

    function removeActivity(id) {
        document.getElementById(id).remove();
        activitiesCount--;
        checkButtonStatus();
    }

    function checkButtonStatus() {
        document.getElementById('btn_add').style.display = activitiesCount >= 5 ? 'none' : 'block';
    }

    function log(msg, type = 'info') {
        const consoleEl = document.getElementById('console');
        const time = new Date().toLocaleTimeString('es-CL', { hour12: false });
        const div = document.createElement('div');
        div.className = `log-entry log-${type}`;
        div.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
        consoleEl.appendChild(div);
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    function toggleCard(n) {
        const card = document.getElementById(`card${n}`);
        if (card.classList.contains('locked')) return;
        card.classList.toggle('active');
    }

    function saveStep1() {
        const rut = document.getElementById('e_rut').value;
        if (!rut) {
            log('Error: Debe ingresar un RUT válido para continuar[cite: 2].', 'error');
            return;
        }
        
        log(`Paso 01 completado: Emisor ${rut} configurado localmente.`, 'success');
        document.getElementById('status1').textContent = 'LISTO';
        document.getElementById('card2').classList.remove('locked');
        document.getElementById('card1').classList.remove('active');
        document.getElementById('card2').classList.add('active');
    }

    function clearLogs() {
        document.getElementById('console').innerHTML = '<div class="log-entry">Terminal despejada...</div>';
    }

    // Datos de ejemplo genéricos al cargar[cite: 2]
    window.onload = () => {
        addActivity('702000', 'ASESORIAS EN GESTION');
    }
</script>

</body>
</html>
