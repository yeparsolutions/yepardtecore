<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YeparDTE — Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Instrument+Serif&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f6f2; --surface: #ffffff; --border: #e3e1d9;
            --text: #1a1a1a; --muted: #7a7770; --accent: #1a1a1a;
            --error: #c1121f; --step-done: #2d6a4f; --step-pending: #d5d1c7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; color: var(--text); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 560px; padding: 2.5rem; position: relative; }
        .steps-bar { display: flex; gap: 6px; margin-bottom: 2rem; }
        .step-dot { width: 28px; height: 5px; border-radius: 99px; background: var(--step-pending); }
        .step-dot.active { background: var(--accent); width: 44px; }
        .step-dot.done { background: var(--step-done); }
        h2 { font-family: 'Instrument Serif', serif; font-size: 1.75rem; margin-bottom: 1.5rem; }
        .field { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-bottom: 0.4rem; }
        input { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 10px; outline: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { width: 100%; padding: 0.85rem; background: var(--accent); color: #fff; border: none; border-radius: 12px; cursor: pointer; font-weight: 500; }
        .btn:disabled { opacity: 0.3; }
        .step { display: none; } .step.active { display: block; }
        #loading-overlay { display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.9); z-index: 10; border-radius: 20px; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div id="loading-overlay"><p id="loading-text">Procesando...</p></div>
    <div class="steps-bar" id="stepsBar"></div>

    <div class="step active" id="step1">
        <h2>Cuenta Personal</h2>
        <div class="grid-2">
            <div class="field"><label>Nombre</label><input type="text" id="nombre"></div>
            <div class="field"><label>Apellido</label><input type="text" id="apellido"></div>
        </div>
        <div class="field"><label>Email</label><input type="email" id="email"></div>
        <div class="field"><label>Contraseña</label><input type="password" id="password"></div>
        <div class="field">
            <label>RUT Personal (Sin puntos, con guion)</label>
            <input type="text" id="rut-usuario" placeholder="12345678-9" oninput="validarRut(this)">
        </div>
        <button class="btn" id="btn1" onclick="goStep(2)" disabled>Continuar</button>
    </div>

    <div class="step" id="step2">
        <h2>Datos de Empresa</h2>
        <div class="field">
            <label>RUT Empresa (Sin puntos, con guion)</label>
            <input type="text" id="rut-empresa" placeholder="76123456-7" oninput="validarRut(this)">
        </div>
        <div class="field"><label>Razón Social</label><input type="text" id="razon-social"></div>
        <div class="field"><label>Giro</label><input type="text" id="giro"></div>
        <div class="field"><label>Dirección</label><input type="text" id="direccion"></div>
        <div class="grid-2">
            <div class="field"><label>Comuna</label><input type="text" id="comuna" placeholder="Ej: Providencia"></div>
            <div class="field"><label>Ciudad</label><input type="text" id="ciudad" placeholder="Ej: Santiago"></div>
        </div>
        <div class="grid-2">
            <button class="btn" style="background:#ccc" onclick="goStep(1)">Atrás</button>
            <button class="btn" id="btn2" onclick="goStep(3)" disabled>Continuar</button>
        </div>
    </div>

    <div class="step" id="step3">
        <h2>Finalizar</h2>
        <button class="btn" onclick="submitAll()">Guardar en Base de Datos</button>
    </div>
</div>

<script>
let currentStep = 1;

function validarRut(input) {
    let val = input.value.replace(/\./g, '');
    if (val.length > 1 && !val.includes('-')) {
        val = val.slice(0, -1) + '-' + val.slice(-1);
        input.value = val;
    }
    const isValid = /^[0-9]+-[0-9Kk]$/.test(input.value);
    const btn = currentStep === 1 ? document.getElementById('btn1') : document.getElementById('btn2');
    btn.disabled = !isValid;
}

function goStep(n) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('step' + n).classList.add('active');
    currentStep = n;
    updateDots();
}

function updateDots() {
    const bar = document.getElementById('stepsBar');
    bar.innerHTML = '';
    for (let i = 1; i <= 3; i++) bar.innerHTML += `<div class="step-dot ${i === currentStep ? 'active' : (i < currentStep ? 'done' : '')}"></div>`;
}

async function submitAll() {
    const overlay = document.getElementById('loading-overlay');
    const loadText = document.getElementById('loading-text');
    overlay.style.display = 'flex';

    try {
        loadText.textContent = "Registrando usuario...";
        const resUser = await fetch('/v1/auth/registro', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                nombre: document.getElementById('nombre').value,
                apellido: document.getElementById('apellido').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            })
        });

        // Manejo robusto de errores del servidor
        if (!resUser.ok) {
            const errorText = await resUser.text();
            let errorMsg;
            try { errorMsg = JSON.parse(errorText).detail; } 
            catch { errorMsg = `Error del servidor (500): ${errorText.substring(0, 50)}...`; }
            throw new Error(errorMsg);
        }

        const userData = await resUser.json();

        loadText.textContent = "Registrando empresa...";
        const resEmisor = await fetch('/v1/emisores/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${userData.access_token}`
            },
            body: JSON.stringify({
                rut: document.getElementById('rut-empresa').value,
                razon_social: document.getElementById('razon-social').value,
                giro: document.getElementById('giro').value,
                direccion: document.getElementById('direccion').value,
                comuna: document.getElementById('comuna').value,
                ciudad: document.getElementById('ciudad').value,
                ambiente: "certificacion"
            })
        });

        if (!resEmisor.ok) throw new Error("No se pudo crear la empresa");

        loadText.textContent = "¡Éxito!";
        setTimeout(() => window.location.reload(), 1500);

    } catch (err) {
        overlay.style.display = 'none';
        alert("ERROR: " + err.message);
    }
}
updateDots();
</script>
</body>
</html>
